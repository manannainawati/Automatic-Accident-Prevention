<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Accident Prevention System{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Automatic Accident Prevention System with Patient Monitoring{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        /* ============================================================
           Base Layout — Shared across all pages
           ============================================================ */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.85);
            --bg-card-hover: rgba(30, 41, 59, 0.9);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --status-normal: #10b981;
            --status-warning: #f59e0b;
            --status-critical: #f97316;
            --status-emergency: #ef4444;
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: rgba(17, 24, 39, 0.97);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .sidebar-brand .brand-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5));
        }

        .sidebar-brand .brand-text {
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }

        .sidebar-brand .brand-sub {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            display: block;
            -webkit-text-fill-color: var(--text-muted);
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
            font-weight: 600;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--accent-blue);
            border-radius: 0 3px 3px 0;
        }

        .nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--glass-border);
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        /* ---- Main Content ---- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 60px; overflow: hidden; }
            .sidebar .brand-text, .sidebar .brand-sub, .sidebar .nav-label, .sidebar-footer { display: none; }
            .sidebar-brand { justify-content: center; padding: 20px 10px; }
            .nav-item { justify-content: center; padding: 12px 8px; }
            .nav-item .nav-icon { width: auto; }
            .main-content { margin-left: 60px; }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>

<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <a href="/" class="sidebar-brand">
            <span class="brand-icon">🛡️</span>
            <span class="brand-text">
                Accident Prevention
                <span class="brand-sub">Monitoring System</span>
            </span>
        </a>
        <div class="sidebar-nav">
            <a href="/dashboard" class="nav-item {% block nav_dashboard %}{% endblock %}" id="nav-dashboard">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="/patients" class="nav-item {% block nav_patients %}{% endblock %}" id="nav-patients">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Patients</span>
            </a>
        </div>
        <div class="sidebar-footer">
            &copy; 2026 Accident Prevention System
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
